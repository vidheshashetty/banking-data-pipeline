name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install minimal deps
      run: |
        pip install pandas

    - name: Syntax check (real validation)
      run: |
        python -m py_compile load_raw_data.py
        python -m py_compile mark_processed.py

    - name: Skip heavy jobs intentionally
      run: echo "PySpark and GX skipped in CI (env-dependent)"
